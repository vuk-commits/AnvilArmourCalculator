<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anvil Empires — Armour Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ── Variables ── */
:root {
  --bg:      #0a0a0a;
  --surface: #111111;
  --panel:   #161616;
  --border:  #242424;
  --border2: #2e2e2e;
  --text:    #f0f0f0;
  --muted:   #555555;
  --dim:     #333333;
  --white:   #ffffff;

  --crude-color:    #c0c0c0; --crude-bg:    #222222; --crude-border:    #555555;
  --light-color:    #6ee7b7; --light-bg:    #0d2b20; --light-border:    #1e5c3e;
  --medium-color:   #93c5fd; --medium-bg:   #0d1f35; --medium-border:   #1a3a5c;
  --heavy-color:    #fbbf24; --heavy-bg:    #2b1d06; --heavy-border:    #5c3a0a;
  --clothing-color: #c4b5fd; --clothing-bg: #1a1030; --clothing-border: #3d2570;

  --t0-color: #aaaaaa; --t0-bg: #1f1f1f; --t0-border: #444444;
  --t1-color: #6ee7b7; --t1-bg: #0d2b20; --t1-border: #1e5c3e;
  --t2-color: #60a5fa; --t2-bg: #0d1a30; --t2-border: #1a3558;
  --t3-color: #fbbf24; --t3-bg: #2b1e06; --t3-border: #5c3a08;

  --a-color: #7dd3fc; --a-bg: #0d1a22; --a-border: #1e3d52;
  --b-color: #d4b896; --b-bg: #1c1610; --b-border: #3d2e1e;
}

/* ── Reset ── */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Base ── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
header {
  padding: 40px 32px 32px;
  border-bottom: 1px solid var(--border);
}
.header-inner {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}
.header-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 3px;
}
h1 {
  font-size: clamp(22px, 3vw, 36px);
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.02em;
  line-height: 1.1;
}
h1 em { font-style: normal; color: var(--muted); font-weight: 300; }
.header-desc {
  font-size: 12px;
  color: var(--muted);
  max-width: 280px;
  line-height: 1.5;
  text-align: right;
}

/* ── Main layout ── */
main {
  max-width: 1600px;
  margin: 0 auto;
  padding: 20px 32px 4px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Top row ── */
.top-row {
  display: grid;
  grid-template-columns: 1fr 3fr 1fr;
  gap: 10px;
  align-items: start;
}
@media (max-width: 900px) {
  .top-row { grid-template-columns: 1fr; }
}

/* ── Loadout card ── */
.loadout-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  user-select: none;
}
.loadout-card:hover { border-color: var(--border2); }
.loadout-card.loadout-a { --lc: var(--a-color); --lb: var(--a-bg); --lbr: var(--a-border); }
.loadout-card.loadout-b { --lc: var(--b-color); --lb: var(--b-bg); --lbr: var(--b-border); }
.loadout-card.active { border-color: var(--lbr); box-shadow: 0 0 0 1px var(--lbr); }

.loadout-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}
.loadout-card-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}
.loadout-card.active .loadout-card-title { color: var(--lc); }

.loadout-active-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--lbr);
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.loadout-card.active .loadout-active-dot { opacity: 1; }

.loadout-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 2px 6px;
  border-radius: 3px;
  text-transform: uppercase;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all 0.15s;
}
.loadout-card.active .loadout-badge { background: var(--lb); border-color: var(--lbr); color: var(--lc); }

.loadout-clear-btn {
  margin-left: auto;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.07em;
  padding: 2px 7px;
  border-radius: 3px;
  text-transform: uppercase;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.15s;
  flex-shrink: 0;
}
.loadout-clear-btn:hover { border-color: #7f2020; color: #f87171; background: #1a0a0a; }
.loadout-clear-btn:disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }

.loadout-card-body { padding: 10px 13px; }

.loadout-stats { display: flex; gap: 6px; margin-bottom: 8px; }
.loadout-stat {
  flex: 1;
  padding: 6px 7px;
  background: var(--surface);
  border-radius: 4px;
  border: 1px solid var(--border);
}
.loadout-stat-label {
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 3px;
}
.loadout-stat-value { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; line-height: 1; }

.loadout-pieces { display: flex; flex-direction: column; gap: 3px; }
.loadout-piece {
  font-size: 10px;
  color: var(--muted);
  padding: 3px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 4px;
}
.loadout-piece:last-child { border-bottom: none; }
.loadout-piece.has-item .loadout-piece-name { color: var(--text); }
.loadout-piece-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.loadout-piece-tier {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 1px 4px;
  border-radius: 2px;
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--dim);
}
.loadout-piece-tier.tier-t0 { background: var(--t0-bg); border-color: var(--t0-border); color: var(--t0-color); }
.loadout-piece-tier.tier-t1 { background: var(--t1-bg); border-color: var(--t1-border); color: var(--t1-color); }
.loadout-piece-tier.tier-t2 { background: var(--t2-bg); border-color: var(--t2-border); color: var(--t2-color); }
.loadout-piece-tier.tier-t3 { background: var(--t3-bg); border-color: var(--t3-border); color: var(--t3-color); }

.loadout-select-hint {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-align: center;
  padding: 6px 0 2px;
  border-top: 1px solid var(--border);
  margin-top: 6px;
}
.loadout-card.active .loadout-select-hint { color: var(--lc); }

/* ── Results panel ── */
.results-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
}
.results-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.results-title { font-size: 10px; font-weight: 600; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; }
.results-body { padding: 10px 16px; }

/* Single-loadout stats grid */
.results-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: 10px;
}
@media (max-width: 700px) { .results-grid { grid-template-columns: repeat(2, 1fr); } }
.result-stat { padding: 14px 16px; background: var(--surface); }
.result-stat-label { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.result-stat-value { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; line-height: 1; letter-spacing: -0.02em; }
.result-stat-sub { font-size: 10px; color: var(--muted); margin-top: 5px; }

/* VS comparison */
.vs-grid {
  display: grid;
  grid-template-columns: 1fr 28px 1fr;
  margin-bottom: 10px;
}
.vs-col { display: grid; grid-template-rows: auto 1fr 1fr; gap: 1px; }
.vs-col.col-a { background: var(--border); border-radius: 5px 0 0 5px; overflow: hidden; }
.vs-col.col-b { background: var(--border); border-radius: 0 5px 5px 0; overflow: hidden; }
.vs-col-header {
  padding: 8px 14px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.vs-col-header.hdr-a { color: var(--a-color); }
.vs-col-header.hdr-b { color: var(--b-color); }
.vs-pair-half {
  padding: 7px 12px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.vs-pair-half.winner-a { background: #0c1a22; }
.vs-pair-half.winner-b { background: #1a1610; }
.vs-divider {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 28px;
  flex-shrink: 0;
  position: relative;
}
.vs-divider::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0; left: 50%;
  width: 1px;
  background: var(--border2);
  transform: translateX(-50%);
}
.vs-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  background: var(--panel);
  padding: 3px 4px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  position: relative;
  z-index: 1;
}
.vs-stat-label { font-size: 8px; font-weight: 600; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
.vs-stat-value { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; line-height: 1; letter-spacing: -0.02em; }
.vs-stat-sub { font-size: 9px; color: var(--muted); margin-top: 2px; }
.vs-winner-badge {
  display: inline-block;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 1px 4px;
  border-radius: 3px;
  text-transform: uppercase;
  margin-top: 3px;
}
.vs-winner-badge.badge-a    { background: var(--a-bg); border: 1px solid var(--a-border); color: var(--a-color); }
.vs-winner-badge.badge-b    { background: var(--b-bg); border: 1px solid var(--b-border); color: var(--b-color); }
.vs-winner-badge.badge-tie  { background: var(--surface); border: 1px solid var(--border2); color: var(--muted); }
.vs-winner-badge.badge-lose { background: var(--surface); border: 1px solid #3a2020; color: #6b3333; }

/* Bars */
.bar-section { margin-bottom: 16px; }
.bar-row { margin-bottom: 8px; }
.bar-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.bar-label span { font-size: 11px; color: var(--muted); font-weight: 500; }
.bar-label strong { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
.bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; transition: width 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
.bar-fill.dmg  { background: #f87171; }
.bar-fill.stab { background: #60a5fa; }

/* Dual bars (VS mode) */
.dual-bar-row { margin-bottom: 6px; }
.dual-bar-label { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
.dual-bar-wrap { display: flex; align-items: center; gap: 6px; }
.dual-bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.dual-bar-track.track-a { direction: rtl; }
.dual-bar-fill-a { height: 100%; border-radius: 2px; background: var(--a-border); transition: width 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
.dual-bar-fill-b { height: 100%; border-radius: 2px; background: var(--b-border); transition: width 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
.dual-bar-center { width: 1px; height: 12px; background: var(--border2); flex-shrink: 0; }

/* Equipped chips */
.equipped-section { margin-bottom: 14px; }
.equipped-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.equipped-chip {
  padding: 3px 8px;
  border-radius: 3px;
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.04em;
}
.equipped-chip.none { color: var(--muted); border-color: var(--border); font-weight: 400; }

/* ── Editing strip ── */
.editing-strip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--panel);
  font-size: 11px;
  color: var(--muted);
}
.editing-strip.strip-a { border-color: var(--a-border); background: var(--a-bg); color: var(--a-color); }
.editing-strip.strip-b { border-color: var(--b-border); background: var(--b-bg); color: var(--b-color); }
.editing-strip strong { font-weight: 700; font-size: 12px; }

.strip-clear-btn {
  margin-left: auto;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.07em;
  padding: 3px 9px;
  border-radius: 3px;
  text-transform: uppercase;
  background: transparent;
  border: 1px solid currentColor;
  color: inherit;
  opacity: 0.45;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.15s;
}
.strip-clear-btn:hover { opacity: 1; background: rgba(248, 113, 113, 0.08); border-color: #f87171; color: #f87171; }
.strip-clear-btn:disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; }

/* ── Slot cards ── */
.cards-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}
@media (max-width: 900px) { .cards-row { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 600px) {
  .cards-row { grid-template-columns: repeat(2, 1fr); }
  main { padding: 16px 16px 48px; }
  header { padding: 28px 16px 22px; }
}

.slot-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.slot-card:hover { border-color: var(--border2); }
.slot-card.active.type-Crude    { border-color: var(--crude-border); }
.slot-card.active.type-Light    { border-color: var(--light-border); }
.slot-card.active.type-Medium   { border-color: var(--medium-border); }
.slot-card.active.type-Heavy    { border-color: var(--heavy-border); }
.slot-card.active.type-Clothing { border-color: var(--clothing-border); }

.slot-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 11px;
  border-bottom: 1px solid var(--border);
}
.slot-icon {
  width: 32px;
  height: 32px;
  border-radius: 4px;
  flex-shrink: 0;
  background: #0e0e0e;
  border: 1px solid var(--border2);
  overflow: hidden;
  display: grid;
  place-items: center;
  transition: border-color 0.2s;
}
.slot-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
.slot-card.active.type-Crude    .slot-icon { border-color: var(--crude-border); }
.slot-card.active.type-Light    .slot-icon { border-color: var(--light-border); }
.slot-card.active.type-Medium   .slot-icon { border-color: var(--medium-border); }
.slot-card.active.type-Heavy    .slot-icon { border-color: var(--heavy-border); }
.slot-card.active.type-Clothing .slot-icon { border-color: var(--clothing-border); }

.slot-title-group { flex: 1; min-width: 0; }
.slot-name { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; color: var(--white); text-transform: uppercase; }
.slot-sub  { font-size: 10px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.slot-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 2px 5px;
  border-radius: 3px;
  text-transform: uppercase;
  white-space: nowrap;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
}
.slot-card.active.type-Crude    .slot-badge { color: var(--crude-color);    background: var(--crude-bg);    border-color: var(--crude-border); }
.slot-card.active.type-Light    .slot-badge { color: var(--light-color);    background: var(--light-bg);    border-color: var(--light-border); }
.slot-card.active.type-Medium   .slot-badge { color: var(--medium-color);   background: var(--medium-bg);   border-color: var(--medium-border); }
.slot-card.active.type-Heavy    .slot-badge { color: var(--heavy-color);    background: var(--heavy-bg);    border-color: var(--heavy-border); }
.slot-card.active.type-Clothing .slot-badge { color: var(--clothing-color); background: var(--clothing-bg); border-color: var(--clothing-border); }

.slot-body { padding: 10px 11px; }
.section-label { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }

.armour-grid { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.armour-btn {
  width: 100%;
  padding: 5px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 400;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.1s;
  text-align: left;
  line-height: 1.2;
}
.armour-btn:hover { border-color: var(--border2); color: var(--text); }
.armour-btn.none-btn { color: var(--dim); font-size: 10px; }
.armour-btn.none-btn.selected { background: var(--surface); border-color: var(--border2); color: var(--muted); }
.armour-btn.selected.type-Crude    { background: var(--crude-bg);    border-color: var(--crude-border);    color: var(--crude-color);    font-weight: 600; }
.armour-btn.selected.type-Light    { background: var(--light-bg);    border-color: var(--light-border);    color: var(--light-color);    font-weight: 600; }
.armour-btn.selected.type-Medium   { background: var(--medium-bg);   border-color: var(--medium-border);   color: var(--medium-color);   font-weight: 600; }
.armour-btn.selected.type-Heavy    { background: var(--heavy-bg);    border-color: var(--heavy-border);    color: var(--heavy-color);    font-weight: 600; }
.armour-btn.selected.type-Clothing { background: var(--clothing-bg); border-color: var(--clothing-border); color: var(--clothing-color); font-weight: 600; }

.quality-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
.quality-btn {
  padding: 5px 2px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.03em;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.1s;
  text-transform: uppercase;
  text-align: center;
}
.quality-btn:hover:not(:disabled) { border-color: var(--border2); color: var(--text); }
.quality-btn:disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
.quality-btn.selected.tier-t0 { background: var(--t0-bg); border-color: var(--t0-border); color: var(--t0-color); font-weight: 700; }
.quality-btn.selected.tier-t1 { background: var(--t1-bg); border-color: var(--t1-border); color: var(--t1-color); font-weight: 700; }
.quality-btn.selected.tier-t2 { background: var(--t2-bg); border-color: var(--t2-border); color: var(--t2-color); font-weight: 700; }
.quality-btn.selected.tier-t3 { background: var(--t3-bg); border-color: var(--t3-border); color: var(--t3-color); font-weight: 700; }

.stat-preview { display: flex; gap: 5px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
.stat-pill { flex: 1; padding: 6px 7px; background: var(--surface); border-radius: 4px; border: 1px solid var(--border); }
.stat-pill-label { font-size: 8px; font-weight: 500; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
.stat-pill-value { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; line-height: 1; }

/* ── Footer ── */
footer {
  border-top: 1px solid var(--border);
  width: 100%;
  padding: 8px 32px;
}
.footnote {
  font-size: 10px;
  color: var(--dim);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.footnote code {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 1px 5px;
  border-radius: 3px;
}
.footnote-sep { color: var(--border2); }

</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="header-label">Anvil Empires</div>
      <h1>Armour <em>Calculator</em></h1>
    </div>
    <div class="header-desc">Build two loadouts and compare them head-to-head, or use a single loadout to see your total mitigation.</div>
  </div>
</header>

<main id="app"></main>

<footer>
  <div class="footnote">
    <code>Total Mitigation = 1 − ((1−A)×(1−B)×…)</code>
    <span class="footnote-sep">·</span>
    Quality multiplies base value per piece
    <span class="footnote-sep">·</span>
    <code>Effective Health = 100 / ((1−A)×(1−B)×…)</code>
  </div>
</footer>

<script>

// ── Data ──

const SLOTS = [
  { id: 'helmet',      label: 'Helmet',        slot: 'Helmet',         iconUrl: 'https://anvilempires.wiki.gg/images/IconHeavyArmouryHead001_R.png?ee3c75' },
  { id: 'chest',       label: 'Chest Armour',  slot: 'Chest Armour',   iconUrl: 'https://anvilempires.wiki.gg/images/IconHeavyArmourBody001_R.png?f0e77f' },
  { id: 'legs',        label: 'Leg Armour',    slot: 'Leg Armour',     iconUrl: 'https://anvilempires.wiki.gg/images/IconHeavyArmourLeg001_R.png?611eb3' },
  { id: 'chest_cloth', label: 'Chest Clothing',slot: 'Chest Clothing', iconUrl: 'https://anvilempires.wiki.gg/images/IconClothingBody001_R_M.png?3b4c7d' },
  { id: 'legs_cloth',  label: 'Leg Clothing',  slot: 'Leg Clothing',   iconUrl: 'https://anvilempires.wiki.gg/images/IconClothingLeg001_R_M_.png?5de935' },
];

const ARMOUR_DATA = [
  { name: 'Crude Helmet',            slot: 'Helmet',         type: 'Crude',    dmg: 0.04, stab: 0.00 },
  { name: 'Light Helmet',            slot: 'Helmet',         type: 'Light',    dmg: 0.06, stab: 0.03 },
  { name: 'Reinforced Helmet',       slot: 'Helmet',         type: 'Medium',   dmg: 0.13, stab: 0.09 },
  { name: 'Heavy Helmet',            slot: 'Helmet',         type: 'Heavy',    dmg: 0.16, stab: 0.11 },
  { name: 'Crude Chest Armour',      slot: 'Chest Armour',   type: 'Crude',    dmg: 0.11, stab: 0.00 },
  { name: 'Light Chest Armour',      slot: 'Chest Armour',   type: 'Light',    dmg: 0.24, stab: 0.12 },
  { name: 'Reinforced Chest Armour', slot: 'Chest Armour',   type: 'Medium',   dmg: 0.58, stab: 0.32 },
  { name: 'Heavy Chest Armour',      slot: 'Chest Armour',   type: 'Heavy',    dmg: 0.64, stab: 0.35 },
  { name: 'Common Garment',          slot: 'Chest Clothing', type: 'Clothing', dmg: 0.04, stab: 0.02 },
  { name: 'Crude Leg Armour',        slot: 'Leg Armour',     type: 'Crude',    dmg: 0.01, stab: 0.00 },
  { name: 'Light Leg Armour',        slot: 'Leg Armour',     type: 'Light',    dmg: 0.04, stab: 0.02 },
  { name: 'Reinforced Leg Armour',   slot: 'Leg Armour',     type: 'Medium',   dmg: 0.08, stab: 0.07 },
  { name: 'Heavy Leg Armour',        slot: 'Leg Armour',     type: 'Heavy',    dmg: 0.10, stab: 0.08 },
  { name: 'Common Bottoms',          slot: 'Leg Clothing',   type: 'Clothing', dmg: 0.02, stab: 0.01 },
];

const QUALITY = [
  { label: 'T0 +0%',  key: 'base', mult: 1.0, tier: 't0' },
  { label: 'T1 +10%', key: 'q1',   mult: 1.1, tier: 't1' },
  { label: 'T2 +20%', key: 'q2',   mult: 1.2, tier: 't2' },
  { label: 'T3 +30%', key: 'q3',   mult: 1.3, tier: 't3' },
];

const TIER_LABELS = { base: 'T0', q1: 'T1', q2: 'T2', q3: 'T3' };

const TYPE_COLORS = {
  Crude:    { color: 'var(--crude-color)',    bg: 'var(--crude-bg)',    border: 'var(--crude-border)' },
  Light:    { color: 'var(--light-color)',    bg: 'var(--light-bg)',    border: 'var(--light-border)' },
  Medium:   { color: 'var(--medium-color)',   bg: 'var(--medium-bg)',   border: 'var(--medium-border)' },
  Heavy:    { color: 'var(--heavy-color)',    bg: 'var(--heavy-bg)',    border: 'var(--heavy-border)' },
  Clothing: { color: 'var(--clothing-color)', bg: 'var(--clothing-bg)', border: 'var(--clothing-border)' },
};

// ── State ──

function makeEmptyLoadout() {
  const l = {};
  SLOTS.forEach(s => { l[s.id] = { armour: null, quality: 'base' }; });
  return l;
}

const loadouts = { a: makeEmptyLoadout(), b: makeEmptyLoadout() };
let activeLoadout = 'a';

// ── Helpers ──

function isCrude(name) {
  const a = ARMOUR_DATA.find(x => x.name === name);
  return a?.type === 'Crude';
}

function getArmourForSlot(slotId) {
  const slot = SLOTS.find(s => s.id === slotId);
  return ARMOUR_DATA.filter(a => a.slot === slot.slot);
}

function getEffectiveStat(name, stat, quality) {
  if (!name) return 0;
  const a = ARMOUR_DATA.find(x => x.name === name);
  if (!a) return 0;
  return Math.min(a[stat] * QUALITY.find(x => x.key === quality).mult, 1);
}

function calcMitigation(values) {
  return 1 - values.reduce((acc, v) => acc * (1 - v), 1);
}

function calcEffectiveHealth(values) {
  const p = values.reduce((acc, v) => acc * (1 - v), 1);
  return p <= 0 ? Infinity : 100 / p;
}

function loadoutStats(loadout) {
  const dmg  = SLOTS.map(s => getEffectiveStat(loadout[s.id].armour, 'dmg',  loadout[s.id].quality));
  const stab = SLOTS.map(s => getEffectiveStat(loadout[s.id].armour, 'stab', loadout[s.id].quality));
  return {
    dmg:    calcMitigation(dmg),
    stab:   calcMitigation(stab),
    ehDmg:  calcEffectiveHealth(dmg),
    ehStab: calcEffectiveHealth(stab),
  };
}

function hasAnyPiece(loadout) {
  return SLOTS.some(s => loadout[s.id].armour);
}

// ── Renderers ──

function renderLoadoutCard(which) {
  const loadout  = loadouts[which];
  const stats    = loadoutStats(loadout);
  const isActive = activeLoadout === which;
  const label    = which === 'a' ? 'Loadout A' : 'Loadout B';
  const any      = hasAnyPiece(loadout);

  const tierClass = { base: 'tier-t0', q1: 'tier-t1', q2: 'tier-t2', q3: 'tier-t3' };

  const piecesHtml = SLOTS.map(s => {
    const item = loadout[s.id].armour;
    if (!item) return `<div class="loadout-piece"><span class="loadout-piece-name" style="color:var(--dim)">—</span></div>`;
    const a = ARMOUR_DATA.find(x => x.name === item);
    const c = a ? TYPE_COLORS[a.type] : null;
    return `
      <div class="loadout-piece has-item">
        <span class="loadout-piece-name" ${c ? `style="color:${c.color}"` : ''}>${item}</span>
        <span class="loadout-piece-tier ${tierClass[loadout[s.id].quality]}">${TIER_LABELS[loadout[s.id].quality]}</span>
      </div>`;
  }).join('');

  return `
    <div class="loadout-card loadout-${which} ${isActive ? 'active' : ''}" data-loadout="${which}">
      <div class="loadout-card-header">
        <div class="loadout-card-title">${label}</div>
        <div class="loadout-active-dot"></div>
        <div class="loadout-badge">${isActive ? 'Editing' : 'Click to edit'}</div>
        <button class="loadout-clear-btn" data-clear="${which}" ${!any ? 'disabled' : ''} title="Clear all pieces">Clear</button>
      </div>
      <div class="loadout-card-body">
        ${any ? `
        <div class="loadout-stats">
          <div class="loadout-stat">
            <div class="loadout-stat-label">EHP</div>
            <div class="loadout-stat-value" style="color:#f87171">${stats.ehDmg === Infinity ? '∞' : stats.ehDmg.toFixed(1)}</div>
          </div>
          <div class="loadout-stat">
            <div class="loadout-stat-label">ESTAB</div>
            <div class="loadout-stat-value" style="color:#60a5fa">${stats.ehStab === Infinity ? '∞' : stats.ehStab.toFixed(1)}</div>
          </div>
        </div>` : ''}
        <div class="loadout-pieces">${piecesHtml}</div>
        <div class="loadout-select-hint">${isActive ? '▲ Currently editing' : 'Click to switch'}</div>
      </div>
    </div>`;
}

function renderResults() {
  const aHas = hasAnyPiece(loadouts.a);
  const bHas = hasAnyPiece(loadouts.b);

  const fmtPct = v => (v * 100).toFixed(2) + '%';
  const fmtEH  = v => v === Infinity ? '∞' : v.toFixed(1);
  const norm   = v => v === Infinity ? 9999 : v;

  if (aHas && bHas) {
    // VS mode
    const sa = loadoutStats(loadouts.a);
    const sb = loadoutStats(loadouts.b);

    function winner(va, vb) {
      if (Math.abs(va - vb) < 1e-9) return 'tie';
      return va > vb ? 'a' : 'b';
    }
    function badge(w, side) {
      if (w === 'tie') return `<span class="vs-winner-badge badge-tie">Tie</span>`;
      if (w === side)  return `<span class="vs-winner-badge badge-${side}">${side.toUpperCase()} wins</span>`;
      return `<span class="vs-winner-badge badge-lose">${side.toUpperCase()} loses</span>`;
    }
    function cellClass(w, side) {
      return w !== 'tie' && w === side ? `winner-${side}` : '';
    }

    const wDmg    = winner(sa.dmg,           sb.dmg);
    const wStab   = winner(sa.stab,          sb.stab);
    const wEhDmg  = winner(norm(sa.ehDmg),  norm(sb.ehDmg));
    const wEhStab = winner(norm(sa.ehStab), norm(sb.ehStab));

    const maxEhDmg  = Math.max(norm(sa.ehDmg),  norm(sb.ehDmg),  1);
    const maxEhStab = Math.max(norm(sa.ehStab), norm(sb.ehStab), 1);
    const pctA_ehDmg  = sa.ehDmg  === Infinity ? 100 : sa.ehDmg  / maxEhDmg  * 100;
    const pctB_ehDmg  = sb.ehDmg  === Infinity ? 100 : sb.ehDmg  / maxEhDmg  * 100;
    const pctA_ehStab = sa.ehStab === Infinity ? 100 : sa.ehStab / maxEhStab * 100;
    const pctB_ehStab = sb.ehStab === Infinity ? 100 : sb.ehStab / maxEhStab * 100;

    return `
      <div class="results-panel">
        <div class="results-header">
          <div class="results-title">Head-to-Head Comparison</div>
          <span style="font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase">VS</span>
        </div>
        <div class="results-body">
          <div class="vs-grid">
            <div class="vs-col col-a">
              <div class="vs-col-header hdr-a">Loadout A</div>
              <div class="vs-pair-half ${cellClass(wEhDmg, 'a')}">
                <div class="vs-stat-label">Effective HP / Dmg Mitigation</div>
                <div class="vs-stat-value" style="color:#f87171">${fmtEH(sa.ehDmg)} <span style="font-size:13px;opacity:0.6">/ ${fmtPct(sa.dmg)}</span></div>
                ${badge(wEhDmg, 'a')}
              </div>
              <div class="vs-pair-half ${cellClass(wEhStab, 'a')}">
                <div class="vs-stat-label">Effective Stability / Stab Mitigation</div>
                <div class="vs-stat-value" style="color:#60a5fa">${fmtEH(sa.ehStab)} <span style="font-size:13px;opacity:0.6">/ ${fmtPct(sa.stab)}</span></div>
                ${badge(wEhStab, 'a')}
              </div>
            </div>
            <div class="vs-divider">
              <div class="vs-label" style="color:var(--muted);font-size:13px;font-weight:700">VS</div>
            </div>
            <div class="vs-col col-b">
              <div class="vs-col-header hdr-b">Loadout B</div>
              <div class="vs-pair-half ${cellClass(wEhDmg, 'b')}">
                <div class="vs-stat-label">Effective HP / Dmg Mitigation</div>
                <div class="vs-stat-value" style="color:#f87171">${fmtEH(sb.ehDmg)} <span style="font-size:13px;opacity:0.6">/ ${fmtPct(sb.dmg)}</span></div>
                ${badge(wEhDmg, 'b')}
              </div>
              <div class="vs-pair-half ${cellClass(wEhStab, 'b')}">
                <div class="vs-stat-label">Effective Stability / Stab Mitigation</div>
                <div class="vs-stat-value" style="color:#60a5fa">${fmtEH(sb.ehStab)} <span style="font-size:13px;opacity:0.6">/ ${fmtPct(sb.stab)}</span></div>
                ${badge(wEhStab, 'b')}
              </div>
            </div>
          </div>
          <div class="bar-section">
            <div class="dual-bar-row">
              <div class="dual-bar-label">Effective HP</div>
              <div class="dual-bar-wrap">
                <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--a-color);min-width:36px;text-align:right">${fmtEH(sa.ehDmg)}</div>
                <div class="dual-bar-track track-a"><div class="dual-bar-fill-a" style="width:${pctA_ehDmg.toFixed(1)}%"></div></div>
                <div class="dual-bar-center"></div>
                <div class="dual-bar-track"><div class="dual-bar-fill-b" style="width:${pctB_ehDmg.toFixed(1)}%"></div></div>
                <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--b-color);min-width:36px">${fmtEH(sb.ehDmg)}</div>
              </div>
            </div>
            <div class="dual-bar-row">
              <div class="dual-bar-label">Effective Stability</div>
              <div class="dual-bar-wrap">
                <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--a-color);min-width:36px;text-align:right">${fmtEH(sa.ehStab)}</div>
                <div class="dual-bar-track track-a"><div class="dual-bar-fill-a" style="width:${pctA_ehStab.toFixed(1)}%"></div></div>
                <div class="dual-bar-center"></div>
                <div class="dual-bar-track"><div class="dual-bar-fill-b" style="width:${pctB_ehStab.toFixed(1)}%"></div></div>
                <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--b-color);min-width:36px">${fmtEH(sb.ehStab)}</div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
  } else {
    // Single loadout mode
    const which    = aHas ? 'a' : (bHas ? 'b' : activeLoadout);
    const loadout  = loadouts[which];
    const s        = loadoutStats(loadout);
    const equipped = SLOTS.filter(sl => loadout[sl.id].armour).map(sl => loadout[sl.id].armour);
    const suffix   = (aHas || bHas) ? ` — ${which === 'a' ? 'Loadout A' : 'Loadout B'}` : '';

    return `
      <div class="results-panel">
        <div class="results-header">
          <div class="results-title">Total Mitigation${suffix}</div>
        </div>
        <div class="results-body">
          <div class="results-grid">
            <div class="result-stat">
              <div class="result-stat-label">Damage Mitigation</div>
              <div class="result-stat-value" style="color:#f87171">${fmtPct(s.dmg)}</div>
              <div class="result-stat-sub">damage absorbed</div>
            </div>
            <div class="result-stat">
              <div class="result-stat-label">Stability Mitigation</div>
              <div class="result-stat-value" style="color:#60a5fa">${fmtPct(s.stab)}</div>
              <div class="result-stat-sub">stability absorbed</div>
            </div>
            <div class="result-stat">
              <div class="result-stat-label">Effective HP</div>
              <div class="result-stat-value" style="color:#f87171">${fmtEH(s.ehDmg)}</div>
              <div class="result-stat-sub">vs physical</div>
            </div>
            <div class="result-stat">
              <div class="result-stat-label">Effective Stability</div>
              <div class="result-stat-value" style="color:#60a5fa">${fmtEH(s.ehStab)}</div>
              <div class="result-stat-sub">vs stability</div>
            </div>
          </div>
          <div class="bar-section">
            <div class="bar-row">
              <div class="bar-label"><span>Damage Mitigation</span><strong style="color:#f87171">${fmtPct(s.dmg)}</strong></div>
              <div class="bar-track"><div class="bar-fill dmg" style="width:${Math.min(s.dmg * 100, 100)}%"></div></div>
            </div>
            <div class="bar-row">
              <div class="bar-label"><span>Stability Mitigation</span><strong style="color:#60a5fa">${fmtPct(s.stab)}</strong></div>
              <div class="bar-track"><div class="bar-fill stab" style="width:${Math.min(s.stab * 100, 100)}%"></div></div>
            </div>
          </div>
          <div class="equipped-section">
            <div class="section-label">Equipped</div>
            <div class="equipped-chips">
              ${equipped.length
                ? equipped.map(name => {
                    const a = ARMOUR_DATA.find(x => x.name === name);
                    const c = a ? TYPE_COLORS[a.type] : null;
                    return c
                      ? `<div class="equipped-chip" style="color:${c.color};background:${c.bg};border-color:${c.border}">${name}</div>`
                      : `<div class="equipped-chip">${name}</div>`;
                  }).join('')
                : '<div class="equipped-chip none">Nothing equipped — select pieces below</div>'}
            </div>
          </div>
        </div>
      </div>`;
  }
}

// ── Render ──

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Top row
  const topRow = document.createElement('div');
  topRow.className = 'top-row';
  topRow.innerHTML = renderLoadoutCard('a') + renderResults() + renderLoadoutCard('b');
  app.appendChild(topRow);

  topRow.querySelectorAll('.loadout-card').forEach(card => {
    card.addEventListener('click', () => {
      activeLoadout = card.dataset.loadout;
      render();
    });
  });

  topRow.querySelectorAll('.loadout-clear-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      loadouts[btn.dataset.clear] = makeEmptyLoadout();
      render();
    });
  });

  // Editing strip
  const strip = document.createElement('div');
  const isA = activeLoadout === 'a';
  strip.className = `editing-strip ${isA ? 'strip-a' : 'strip-b'}`;
  strip.innerHTML = `
    <strong>Editing ${isA ? 'Loadout A' : 'Loadout B'}</strong>
    <span style="opacity:0.7">— select pieces and quality below</span>
    <button class="strip-clear-btn" ${!hasAnyPiece(loadouts[activeLoadout]) ? 'disabled' : ''} title="Clear all pieces">Clear loadout</button>`;
  strip.querySelector('.strip-clear-btn').addEventListener('click', () => {
    loadouts[activeLoadout] = makeEmptyLoadout();
    render();
  });
  app.appendChild(strip);

  // Slot cards
  const cardsRow = document.createElement('div');
  cardsRow.className = 'cards-row';

  SLOTS.forEach(slot => {
    const s            = loadouts[activeLoadout][slot.id];
    const options      = getArmourForSlot(slot.id);
    const currentArmour = s.armour ? ARMOUR_DATA.find(a => a.name === s.armour) : null;
    const dmgVal       = getEffectiveStat(s.armour, 'dmg',  s.quality);
    const stabVal      = getEffectiveStat(s.armour, 'stab', s.quality);
    const typeClass    = currentArmour ? `type-${currentArmour.type}` : '';
    const crude        = isCrude(s.armour);

    const card = document.createElement('div');
    card.className = `slot-card ${s.armour ? 'active' : ''} ${typeClass}`;
    card.innerHTML = `
      <div class="slot-header">
        <div class="slot-icon"><img src="${slot.iconUrl}" alt="${slot.label}"></div>
        <div class="slot-title-group">
          <div class="slot-name">${slot.label}</div>
          <div class="slot-sub">${s.armour || '—'}</div>
        </div>
        ${currentArmour ? `<div class="slot-badge">${currentArmour.type}</div>` : ''}
      </div>
      <div class="slot-body">
        <div class="section-label">Piece</div>
        <div class="armour-grid">
          <button class="armour-btn none-btn ${!s.armour ? 'selected' : ''}" data-slot="${slot.id}" data-armour="">None</button>
          ${options.map(a => `
            <button class="armour-btn type-${a.type} ${s.armour === a.name ? 'selected' : ''}" data-slot="${slot.id}" data-armour="${a.name}">${a.name}</button>
          `).join('')}
        </div>
        <div class="section-label">Quality</div>
        <div class="quality-row">
          ${QUALITY.map(q => `
            <button
              class="quality-btn tier-${q.tier} ${s.quality === q.key ? 'selected' : ''}"
              data-slot="${slot.id}"
              data-quality="${q.key}"
              ${crude && q.key !== 'base' ? 'disabled title="Crude armour is T0 only"' : ''}
            >${q.label}</button>
          `).join('')}
        </div>
        ${s.armour ? `
        <div class="stat-preview">
          <div class="stat-pill">
            <div class="stat-pill-label">Dmg</div>
            <div class="stat-pill-value" style="color:#f87171">${(dmgVal * 100).toFixed(1)}%</div>
          </div>
          <div class="stat-pill">
            <div class="stat-pill-label">Stab</div>
            <div class="stat-pill-value" style="color:#60a5fa">${(stabVal * 100).toFixed(1)}%</div>
          </div>
        </div>` : ''}
      </div>`;
    cardsRow.appendChild(card);
  });

  app.appendChild(cardsRow);

  // Events
  app.querySelectorAll('.armour-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const { slot, armour } = e.target.dataset;
      loadouts[activeLoadout][slot].armour = armour || null;
      if (isCrude(armour)) loadouts[activeLoadout][slot].quality = 'base';
      render();
    });
  });

  app.querySelectorAll('.quality-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      loadouts[activeLoadout][e.target.dataset.slot].quality = e.target.dataset.quality;
      render();
    });
  });
}

render();

</script>
</body>
</html>
